name: Telegram Parser

on:
  schedule:
    - cron: '0 * * * *'  # ✅ Запуск каждый час в 00 минут
  workflow_dispatch:     # Ручной запуск

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # ✅ Обновлено с v3

      - name: Set up Python
        uses: actions/setup-python@v5  # ✅ Обновлено с v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run parser
        run: python telegram_parser.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --staged --quiet || git commit -m "Update posts data [skip ci]"
          git push
